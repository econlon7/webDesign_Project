<!DOCTYPE html>
<html lang="eng">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="submit suggestions, querys and give feedback on the website">
    <meta name="keywords" content="contact form,suggestion,query,name,email,submit">
    <title>Contact form</title>
    <link rel="icon" href="images/favicon.ico">
    <link rel="stylesheet" href="styles/style.css">
    <style>
        main
        {
            margin: 15px auto ;
            padding: 20px;
            width: 40%;
            border: solid black;
            background: white;
            min-height: 500px;
            min-width: 400px;
        }
        .required
        {
            font-weight: bold;
            color: red;
        }
        label
        {
            float: left;
            width: 112px;
            padding-right: 10px;
            text-align: right;
        }
        input
        {
            margin-left: 1em;
            margin-bottom: .5em;
        }
        #button
        {
            margin-left: 20%;
        }
        #button, #reset
        {
            margin-top: .5em;
            width: 8em;
            border: 2px solid black;
        }
        #button:hover, #reset:hover
        {
            background-color: aquamarine;
        }
        footer
        {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
        }
    </style>
</head>
<body >
    <header>
        <img id="logo" src="images/alexas_fotos-dog-2804950_1920.png" alt="logo">
        <h1> Dog resources and information </h1>
    </header>
        <nav>
            <ul>
                <li> <a href="index.html"> Home </a></li>
                <li> <a href="dogShelters.html"> Local dog shelters </a></li>
                <li> <a href="events.html"> Events </a></li>
                <li> <a href="legislation.html"> Legislation </a></li>
                <li id="active"> <a href="Contact.html"> Contact us </a></li>
            </ul>
        </nav>
    <main>
        <section>
            <h2> Please enter the following information: </h2>
            <form action="https://foo.com" method="get">

                <label for="first_name" >First name:<span class="required">*</span></label>
                <input type="text" name="first_name" id="first_name" autofocus required><br>

                <label for="last_name">Last name:</label>
                <input type="text" name="last_name" id="last_name"><br>

                <label for="email">Email:<span class="required">*</span></label>
                <input type="email" name="email" id="email" required placeholder="janedoe@example.com">
                <br>

                <label for="type">Contact type :</label>
                <input type="radio" id="type1" name="type" value="suggestion">Suggestion
                <input type="radio" id="type2" name="type" value="query">Query
                <br>

                <label for="message">Message : <span class="required">*</span></label>
                <textarea cols="40" rows="6" id="message" name="message" required placeholder="your message must be lest than 200 characters" data-maxlength="200"></textarea><br>
                <input type="submit" name="submit" id="button" value="Submit">
                <input type="reset" name="reset" id="reset">
            </form>
        </section>
    </main>
    <footer> 
        <ul>
            <li> <a href="index.html"> Home </a></li>
            <li> <a href="legislation.html"> Legislation </a></li>
            <li> <a href="dogShelters.html"> Local dog shelters </a></li>
            <li> <a href="events.html"> Events </a></li>
            <li> <a href="Contact.html"> Contact us </a></li>
        </ul>
        <p> &copy; 2026 college project </p>
    </footer>
</body>
</html>

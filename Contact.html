    <main>
        <section>
            <h3> Please enter the following information: </h3>
            <form action="https://year1.ccpdev.me/FormTest.php" method="post">

                <label for="first_name" >First name:<span class="required">*</span></label>
                <input type="text" name="first_name" id="first_name" autofocus required><br>

                <label for="last_name">Last name:  </label>
                <input type="text" name="last_name" id="last_name"><br>

                <label for="email">Email:<span class="required">*</span></label>
                <input type="email" name="email" id="email" required placeholder="janedoe@example.com">
                <br>

                <label for="type">Contact type :</label>
                <input type="radio" class="type" name="type" value="suggestion">Suggestion
                <input type="radio" class="type" name="type" value="query">Query
                <br>

                <label for="message">Message : <span class="required">*</span></label>
                <textarea cols="40" rows="6" id="message" name="message" required placeholder="your message must be lest than 200 characters" data-maxlength="200"></textarea><br>
                <input type="submit" name="submit" id="button" value="Submit">
                <input type="reset" name="reset" id="reset">
            </form>
        </section>
    </main>
